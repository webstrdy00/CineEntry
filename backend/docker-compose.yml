version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: cineentry-postgres
    environment:
      POSTGRES_USER: cineentry_user
      POSTGRES_PASSWORD: cineentry_password
      POSTGRES_DB: cineentry_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - cineentry-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cineentry_user -d cineentry_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: cineentry-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - cineentry-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  cineentry-network:
    driver: bridge
